<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nickelodeon - Modo Incrustado</title>
    <style>
        /* Quitamos los bordes y márgenes del navegador */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Para que no haya doble barra de desplazamiento */
            background-color: #000;
        }

        /* Contenedor que ocupa toda la pantalla */
        .contenedor-web {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* El frame donde vive la web de Nick */
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Sin bordes feos */
        }
    </style>
</head>
<body>

    <div class="contenedor-web">
        <iframe 
            src="https://web.archive.org/web/20220630233934/https://www.nick.com/" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
